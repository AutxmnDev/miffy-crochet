<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crochet Pattern</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        margin: 0;
        padding: 40px;
        line-height: 1.7;
      }

      .container {
        max-width: 850px;
        margin: auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      }

      h1 {
        text-align: center;
        margin-bottom: 40px;
      }

      h2 {
        margin-top: 50px;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }

      p {
        margin: 12px 0;
      }

      ul {
        margin: 15px 0;
        padding-left: 25px;
      }

      li {
        margin-bottom: 6px;
      }

      strong {
        font-weight: 700;
      }

      em {
        font-style: italic;
      }

      .translation {
        background-color: #ffe5e5;
        border-left: 4px solid #d33;
        padding: 10px 14px;
        margin: 6px 0 16px 0;
        border-radius: 6px;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="title"></h1>
      <div id="content"></div>
    </div>

    <script type="module">
      import crochetPattern from "./data.js";

      const titleEl = document.getElementById("title");
      const contentEl = document.getElementById("content");

      function parseInlineFormatting(text) {
        return text
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>");
      }

      titleEl.textContent = crochetPattern.title;

      crochetPattern.blocks.forEach((block) => {
        switch (block.type) {
          case "subtitle":
            const h2 = document.createElement("h2");
            h2.textContent = block.content;
            contentEl.appendChild(h2);
            break;

          case "paragraph":
            const p = document.createElement("p");
            p.innerHTML = parseInlineFormatting(block.content);
            contentEl.appendChild(p);

            if (block.translation) {
              const translation = document.createElement("div");
              translation.className = "translation";
              translation.innerHTML = parseInlineFormatting(block.translation);
              contentEl.appendChild(translation);
            }

            break;

          case "list":
            const ul = document.createElement("ul");

            block.items.forEach((item) => {
              const li = document.createElement("li");

              if (typeof item === "string") {
                li.innerHTML = parseInlineFormatting(item);
              } else if (typeof item === "object") {
                li.innerHTML = parseInlineFormatting(item.text);

                if (item.translation) {
                  const translation = document.createElement("div");
                  translation.className = "translation";
                  translation.innerHTML = parseInlineFormatting(
                    item.translation
                  );
                  li.appendChild(translation);
                }
              }

              ul.appendChild(li);
            });

            contentEl.appendChild(ul);
            break;

          default:
            console.warn("Unknown block type:", block.type);
        }
      });
    </script>
  </body>
</html>
